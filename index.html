<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false"> 
            <button><img src="search.svg" alt=""></button>
        </div>
        <div class="error"><p>Invalid City name</p></div>
        <div class="weather">
            <img width="64"class="weather-icon" height="95">
            <div><h2 class="weatherType"></h2></div>
            <h1 class="temp"></h1>
            <h2 class="city"></h2>
             
            <div class="details">
                <div class="col">
                   <img src="humidity.png" width="55px">
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                   </div>
                <div class="col">
                  <img width="48" height="48" src="https://img.icons8.com/color/48/wind.png" alt="wind"/>
                   <div>
                    <p class="wind">16 </p>
                    <p>Wind</p>
                   </div>
                </div>
            </div>
        </div>
    </div>
    <!-- https://api.openweathermap.org/data/2.5/weather?q=delhi&appid=ea57d6c293f8d042488daed3af852d38&units=metric -->
    <script>
        const apiKey ="ea57d6c293f8d042488daed3af852d38";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?&units=metric";

        const searchBox = document.querySelector(".search input")
        const searchBtn = document.querySelector(".search button")
        const Icon = document.querySelector(".weather-icon");

        async function checkWeather(city){
            const response = await fetch(apiUrl +`&q=${city}`+`&appid=${apiKey}`);

            if(response.status == 404|| searchBox.value== ""){
                document.querySelector(".error").style.display="block"
                document.querySelector(".weather").style.display="none"
            }
            else{
            var data = await response.json();
             
             document.querySelector(".city").innerHTML= data.name;
             document.querySelector(".temp").innerHTML= Math.round((data.main.temp)) + "°C";
             document.querySelector(".humidity").innerHTML= data.main.humidity+" %";
             document.querySelector(".wind").innerHTML= data.wind.speed+" km/hr";
             document.querySelector(".weatherType").innerHTML=data.weather[0].main;

             if(data.weather[0].main=="Clear"){
             Icon.src = "sun.png";
             }
             
            else if(data.weather[0].main=="Clouds"){
             Icon.src = "cloudy-day.png";
             }
             
            else if(data.weather[0].main=="Drizzle"){
             Icon.src = "drizzle.png";
             }
             
            else if(data.weather[0].main=="Mist"||data.weather[0].main=="Smoke"){
             Icon.src = "mist.png";
             }
             
            else if(data.weather[0].main=="Snow"){
             Icon.src = "snow.png";
             }
            else if(data.weather[0].main=="Haze"){
             Icon.src = "haze.png";
             }
             
             document.querySelector(".weather").style.display="block"
             document.querySelector(".error").style.display="none";
        }
    }

        searchBtn.addEventListener("click", ()=>{checkWeather(searchBox.value)});
        
        searchBox.addEventListener("keydown",(event)=>{
            if(event.key == "Enter")
            checkWeather(searchBox.value)
        })

    </script>
</body>
</html>
